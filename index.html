<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

label{
    font-weight:bold;
}

input,select{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#2575fc;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1a5ed9;
}

#message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Registration</h2>

<form id="regForm">
<div class="input-group">
<label>Name</label>
<input type="text" id="name" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="input-group">
<label>Course</label>
<select id="course">
<option>Graphic Design</option>
<option>Web Development</option>
<option>English Language</option>
</select>
</div>

<div class="input-group">
<label>Age</label>
<input type="number" id="age" min="15" max="50">
</div>

<button type="submit">Register</button>

</form>

<div id="message"></div>

</div>

<script>
document.getElementById("regForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;

    document.getElementById("message").innerHTML =
    "✅ Thank you " + name + "! Your registration was successful.";
});
</script>

</body>
</html>
